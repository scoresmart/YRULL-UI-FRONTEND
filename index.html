<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Ask browsers/proxies not to serve a stale HTML shell (JS filenames change each build). -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Yrull — Automate every customer conversation</title>
    <meta name="description" content="Yrull helps businesses automate Instagram, WhatsApp, and Facebook Messenger conversations. Manage DMs, replies, comments, and automations in one unified inbox." />

    <!-- Open Graph -->
    <meta property="og:title" content="Yrull — Automate every customer conversation" />
    <meta property="og:description" content="Yrull helps businesses automate Instagram, WhatsApp, and Facebook Messenger conversations. Manage DMs, replies, comments, and automations in one unified inbox." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yrull.com" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yrull — Automate every customer conversation" />
    <meta name="twitter:description" content="Yrull helps businesses automate Instagram, WhatsApp, and Facebook Messenger conversations. Manage DMs, replies, comments, and automations in one unified inbox." />
    <meta name="twitter:image" content="/og-image.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="fb-root"></div>
    <script>
      window.fbAsyncInit = function () {
        window.FB.init({
          appId: '1264588558984531',
          version: 'v22.0',
          xfbml: false,
          autoLogAppEvents: false,
        });
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
